name: Auto Update Ranking

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          persist-credentials: false 
          fetch-depth: 0 

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar e Executar Tracker
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
        run: |
          cd raid
          npm install axios
          node tracker_completo.js

      - name: Mover ranking para a pasta do App
        run: |
          mkdir -p booyah-tracker/app
          cp raid/ranking.json booyah-tracker/app/ranking.json

      - name: Commit dos ficheiros
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add booyah-tracker/app/ranking.json
          git commit -m "Auto-update: Ranking atualizado via GitHub Actions" || echo "Sem alterações"

      - name: Push das alterações (Força Bruta)
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          force: true