concurrency:
  group: ranking-update
  cancel-in-progress: false
name: Auto Update Ranking

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar Tracker
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
        run: |
          cd raid
          npm install axios
          node tracker_completo.js

      - name: Guardar alterações no GitHub
  run: |
    git config --global user.name "GitHub Action"
    git config --global user.email "action@github.com"

    # Adiciona ficheiro
    git add booyah-tracker/app/ranking.json

    # Commit (se houver mudanças)
    git commit -m "Auto-update: Ranking atualizado via GitHub Actions" || echo "Sem alterações"

    # Tentar push até conseguir
    for i in {1..5}; do
      git pull origin main --rebase && git push origin main && break
      echo "Conflito detectado, tentando novamente ($i)..."
      sleep 2
    done