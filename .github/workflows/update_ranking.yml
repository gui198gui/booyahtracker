name: Auto Update Ranking

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar e Executar Tracker
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
        run: |
          cd raid
          npm install dotenv axios
          node tracker_completo.js

      - name: Mover ranking para a pasta do App
        run: |
          mkdir -p booyah-tracker/app
          cp raid/ranking.json booyah-tracker/app/ranking.json

      - name: Guardar alterações no GitHub
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # Faz pull primeiro para evitar conflitos (o pulo do gato)
          git pull --rebase origin main
          git add booyah-tracker/app/ranking.json
          git commit -m "Auto-update: Ranking atualizado via GitHub Actions" || echo "Sem alterações"
          git push origin main