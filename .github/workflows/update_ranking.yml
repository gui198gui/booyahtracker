name: Auto Update Ranking

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar Tracker
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
        run: |
          cd raid
          npm install axios
          node tracker_completo.js

      - name: Guardar alterações no GitHub
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 1. Puxa as alterações que você fez no PC para o robô não ficar atrasado
          git pull origin main --rebase
          
          # 2. Adiciona o ficheiro atualizado
          git add booyah-tracker/app/ranking.json
          
          # 3. Tenta gravar. Se não houver mudanças, ele apenas avisa e não dá erro
          git commit -m "Auto-update: Ranking atualizado via GitHub Actions" || echo "Sem alterações"
          
          # 4. Envia para o GitHub
          git push origin main